name: Portfolio
on:
    #push:
     #   branches: [main]
    workflow_dispatch:     


permissions:
    pages: write
    id-token: write
    contents: read

jobs:    
    deploy: 
        runs-on: ubuntu-latest

        environment: 
            name: github-pages
            url: ${{ steps.deployment.outputs.page.url }}

        steps:
         
        # get access to your portfolio code via pre-buit actions
          - name: Checkout code
            uses: actions/checkout@v4

        # setup github pages
          - name: Setup Github Pages
            uses: actions/configure-pages@v4

        # static code artifacts 
          - name: Upload static files
            uses: actions/upload-pages-artifact@v4
            with:
              path: "."
              

        # Make page live 
          - name: Deploy to github pages
            uses: actions/deploy-pages@v4
       




  