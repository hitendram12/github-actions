#This is workflow name
name : hello

#runs on trigger
on:
  push:
    branches: [main]

#This jobs inside the workflow
jobs:

   #This is name of first job
   #This is github runner, each jobs needs a runner 
   greet:

      runs-on: ubuntu-latest
      steps:
        - name: Say Hello
          run : echo "hello dosto"

   details:
     runs-on: ubuntu-latest
     steps:
       - name: show version of kernel
         run: uname -a
 
        
